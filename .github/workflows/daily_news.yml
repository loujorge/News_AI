name: Daily AI News
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Atualizado de v3 para v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Atualizado de v4 para v5
        with:
          python-version: '3.11' # Versão mais estável em 2026

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python news_bot.py

      - name: Commit and push if history changed
        run: |
          git config --global user.name "AI News Bot"
          git config --global user.email "bot@github.com"
          git add sent_news.txt || true
          git commit -m "Update news history" || true
          git push || true
