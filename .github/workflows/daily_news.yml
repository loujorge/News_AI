name: Deploy AI Portal and Notify Slack
on:
  schedule:
   - cron: '23 08 * * *'
  workflow_dispatch:

permissions:
  contents: write # Necessário para guardar o histórico
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python news_bot.py

      - name: Save history to repo
        run: |
          git config --global user.name "AI News Bot"
          git config --global user.email "bot@github.com"
          git add history.txt || true
          git commit -m "Update news history [skip ci]" || true
          git push || true

      - name: Upload HTML to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MESSAGE=$(cat slack_payload.txt)
          PAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"$MESSAGE \n\n 📄 *Full Visual Report:* $PAGE_URL\"}" $SLACK_WEBHOOK_URL
